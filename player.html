<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📺 TV Live Player</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
    }
    #header {
      width: 100%;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 2px solid #e94560;
    }
    #header span { font-size: 20px; }
    #ch-name {
      font-size: 16px;
      font-weight: bold;
      color: #e94560;
    }
    #player-wrap {
      width: 100%;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px;
    }
    video {
      width: 100%;
      max-height: 80vh;
      border-radius: 12px;
      background: #000;
      box-shadow: 0 0 30px rgba(233,69,96,0.3);
    }
    iframe {
      width: 100%;
      height: 75vh;
      border: none;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(233,69,96,0.3);
    }
    #error-box {
      display: none;
      text-align: center;
      padding: 20px;
    }
    #error-box p { color: #aaa; margin-top: 10px; font-size: 14px; }
    #open-btn {
      margin-top: 16px;
      padding: 12px 28px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      border-radius: 30px;
    }
  </style>
</head>
<body>

<div id="header">
  <span>📺</span>
  <div id="ch-name">Loading...</div>
</div>

<div id="player-wrap">
  <div id="error-box">
    <p>⚠️ This stream may require an external player.</p>
    <button id="open-btn" onclick="openExternal()">🌐 Open in Browser</button>
  </div>
</div>

<script>
  const Telegram = window.Telegram.WebApp;
  Telegram.ready();
  Telegram.expand();

  const params = new URLSearchParams(window.location.search);
  const streamUrl = decodeURIComponent(params.get("url") || "");
  const chName = decodeURIComponent(params.get("name") || "Live TV");

  document.getElementById("ch-name").textContent = chName;

  function openExternal() {
    Telegram.openLink(streamUrl);
  }

  const wrap = document.getElementById("player-wrap");

  if (!streamUrl) {
    wrap.innerHTML = "<p style='color:#aaa'>No stream URL provided.</p>";
  } else {
    const ext = streamUrl.split("?")[0].toLowerCase();

    if (ext.endsWith(".m3u8") || ext.endsWith(".mp4") || ext.endsWith(".ts")) {
      // Native video player for direct stream files
      const video = document.createElement("video");
      video.controls = true;
      video.autoplay = true;
      video.src = streamUrl;
      video.onerror = function() {
        wrap.innerHTML = '';
        document.getElementById("error-box").style.display = "block";
        wrap.appendChild(document.getElementById("error-box"));
      };
      wrap.appendChild(video);
    } else {
      // For YouTube live, website streams — use iframe or open externally
      const errBox = document.getElementById("error-box");
      errBox.style.display = "block";
      errBox.querySelector("p").textContent =
        "📡 This stream opens in an external player for best experience.";
      wrap.innerHTML = '';
      wrap.appendChild(errBox);
    }
  }
</script>

</body>
</html>
