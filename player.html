<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>📺 TV Live Player</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
<style>
  :root {
    --red: #e94560;
    --dark: #0a0a0f;
    --card: #12121a;
    --card2: #1a1a28;
    --border: #2a2a3a;
    --text: #f0f0f0;
    --muted: #888;
    --active: #e94560;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; background:var(--dark); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; overflow:hidden; }

  /* ── LAYOUT ── */
  #app { display:flex; flex-direction:column; height:100vh; }

  /* ── HEADER ── */
  #header {
    flex-shrink:0;
    display:flex; align-items:center; gap:10px;
    padding:10px 14px;
    background:linear-gradient(135deg,#12121a,#1a1a28);
    border-bottom:2px solid var(--red);
    z-index:10;
  }
  #live-dot {
    width:9px; height:9px; border-radius:50%;
    background:var(--red);
    animation:pulse 1.2s infinite;
    flex-shrink:0;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.3)} }
  #ch-name { font-size:15px; font-weight:700; color:var(--red); flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  #cat-badge {
    font-size:10px; padding:2px 8px; border-radius:20px;
    background:rgba(233,69,96,.15); border:1px solid rgba(233,69,96,.3);
    color:var(--red); flex-shrink:0;
  }

  /* ── VIDEO WRAP ── */
  #video-wrap {
    flex-shrink:0;
    position:relative;
    background:#000;
    width:100%;
  }
  #video-wrap.fullscreen-active {
    position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:9999;
  }
  #main-video {
    width:100%; display:block;
    max-height:42vh;
    background:#000;
  }
  #video-wrap.fullscreen-active #main-video { max-height:100vh; height:100vh; object-fit:contain; }

  /* controls overlay */
  #controls-overlay {
    position:absolute; bottom:0; left:0; right:0;
    padding:8px 12px;
    background:linear-gradient(transparent,rgba(0,0,0,.85));
    display:flex; align-items:center; gap:10px;
    opacity:1; transition:opacity .3s;
  }
  .ctrl-btn {
    background:rgba(255,255,255,.12);
    border:none; border-radius:50%;
    width:36px; height:36px;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; color:#fff; font-size:16px;
    flex-shrink:0; transition:background .2s;
  }
  .ctrl-btn:hover { background:rgba(233,69,96,.5); }
  .ctrl-btn:active { transform:scale(.9); }

  /* quality selector */
  #quality-wrap { position:relative; }
  #quality-btn { font-size:11px; border-radius:6px !important; width:auto !important; padding:0 10px; font-weight:700; }
  #quality-menu {
    display:none; position:absolute; bottom:44px; left:0;
    background:#1a1a28; border:1px solid var(--border);
    border-radius:8px; overflow:hidden; min-width:90px; z-index:100;
  }
  #quality-menu.open { display:block; }
  .q-opt {
    padding:8px 14px; font-size:12px; cursor:pointer;
    transition:background .15s; white-space:nowrap;
  }
  .q-opt:hover { background:rgba(233,69,96,.2); }
  .q-opt.active { color:var(--red); font-weight:700; }

  #live-label {
    margin-left:auto;
    font-size:10px; font-weight:700; letter-spacing:1px;
    color:var(--red); opacity:.8;
  }

  /* loading / error states */
  #video-state {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    text-align:center; pointer-events:none;
  }
  #spinner {
    width:36px; height:36px; border:3px solid rgba(233,69,96,.2);
    border-top-color:var(--red); border-radius:50%;
    animation:spin .8s linear infinite; margin:0 auto 8px;
  }
  @keyframes spin { to{transform:rotate(360deg)} }
  #state-text { font-size:12px; color:var(--muted); }
  #video-state.hidden { display:none; }

  /* error play button */
  #ext-btn {
    display:none; position:absolute; bottom:50px; left:50%; transform:translateX(-50%);
    padding:10px 22px; background:var(--red); color:#fff;
    border:none; border-radius:30px; font-size:13px; cursor:pointer;
  }

  /* ── TABS ── */
  #tabs {
    flex-shrink:0;
    display:flex; border-bottom:1px solid var(--border);
    background:var(--card);
  }
  .tab {
    flex:1; padding:9px 4px; text-align:center;
    font-size:12px; font-weight:600; color:var(--muted);
    cursor:pointer; border-bottom:2px solid transparent;
    transition:all .2s;
  }
  .tab.active { color:var(--red); border-bottom-color:var(--red); }

  /* ── SCROLLABLE CONTENT ── */
  #content { flex:1; overflow-y:auto; }
  #content::-webkit-scrollbar { width:3px; }
  #content::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  /* channel list */
  #ch-list { padding:8px; }
  .ch-item {
    display:flex; align-items:center; gap:10px;
    padding:10px 12px; border-radius:10px;
    cursor:pointer; transition:background .15s;
    border:1px solid transparent; margin-bottom:6px;
  }
  .ch-item:hover { background:var(--card2); }
  .ch-item.playing {
    background:rgba(233,69,96,.1);
    border-color:rgba(233,69,96,.3);
  }
  .ch-icon {
    width:38px; height:38px; border-radius:8px;
    background:var(--card2); display:flex; align-items:center;
    justify-content:center; font-size:18px; flex-shrink:0;
  }
  .ch-item.playing .ch-icon { background:rgba(233,69,96,.2); }
  .ch-info { flex:1; min-width:0; }
  .ch-title { font-size:13px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ch-sub { font-size:11px; color:var(--muted); margin-top:2px; }
  .ch-item.playing .ch-title { color:var(--red); }
  .ch-live-badge {
    font-size:9px; font-weight:700; letter-spacing:.8px;
    padding:2px 6px; border-radius:4px;
    background:rgba(233,69,96,.15); color:var(--red);
    border:1px solid rgba(233,69,96,.3); flex-shrink:0;
  }

  /* info tab */
  #info-panel { padding:14px; }
  .info-row { display:flex; gap:8px; margin-bottom:10px; align-items:flex-start; }
  .info-label { font-size:11px; color:var(--muted); width:70px; flex-shrink:0; padding-top:1px; }
  .info-val { font-size:13px; font-weight:600; word-break:break-all; }
  .info-url { font-size:11px; color:var(--muted); word-break:break-all; }
  .divider { height:1px; background:var(--border); margin:10px 0; }

  /* toast */
  #toast {
    position:fixed; bottom:80px; left:50%; transform:translateX(-50%);
    background:rgba(233,69,96,.9); color:#fff;
    padding:8px 18px; border-radius:20px; font-size:12px;
    opacity:0; pointer-events:none; transition:opacity .3s; z-index:9999;
    white-space:nowrap;
  }
  #toast.show { opacity:1; }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div id="live-dot"></div>
    <div id="ch-name">Loading...</div>
    <div id="cat-badge">TV</div>
  </div>

  <!-- VIDEO -->
  <div id="video-wrap">
    <video id="main-video" playsinline webkit-playsinline></video>

    <div id="video-state">
      <div id="spinner"></div>
      <div id="state-text">Loading stream...</div>
    </div>

    <button id="ext-btn" onclick="openExternal()">🌐 Open in Browser</button>

    <div id="controls-overlay">
      <!-- Mute -->
      <button class="ctrl-btn" id="mute-btn" onclick="toggleMute()" title="Mute/Unmute">🔊</button>
      <!-- Quality -->
      <div id="quality-wrap">
        <button class="ctrl-btn" id="quality-btn" onclick="toggleQualityMenu()">AUTO</button>
        <div id="quality-menu"></div>
      </div>
      <!-- Fullscreen -->
      <button class="ctrl-btn" id="fs-btn" onclick="toggleFullscreen()" title="Fullscreen">⛶</button>
      <span id="live-label">● LIVE</span>
    </div>
  </div>

  <!-- TABS -->
  <div id="tabs">
    <div class="tab active" id="tab-channels" onclick="switchTab('channels')">📺 Channels</div>
    <div class="tab" id="tab-info" onclick="switchTab('info')">ℹ️ Info</div>
  </div>

  <!-- CONTENT -->
  <div id="content">
    <div id="ch-list"></div>
    <div id="info-panel" style="display:none"></div>
  </div>

</div>
<div id="toast"></div>

<script>
// ── Telegram WebApp init ──────────────────────────────────────
const TG = window.Telegram.WebApp;
TG.ready();
TG.expand();

// ── Parse URL params ─────────────────────────────────────────
const urlParams = new URLSearchParams(window.location.search);
const currentUrl  = decodeURIComponent(urlParams.get("url")  || "");
const currentName = decodeURIComponent(urlParams.get("name") || "Live TV");
const category    = decodeURIComponent(urlParams.get("cat")  || "");

// channels param: JSON array of {name, url} for this category
let allChannels = [];
try {
  const raw = urlParams.get("channels");
  if (raw) allChannels = JSON.parse(decodeURIComponent(raw));
} catch(e) {}

// If no channels list passed, use the single channel
if (!allChannels.length && currentUrl) {
  allChannels = [{ name: currentName, url: currentUrl }];
}

// ── State ────────────────────────────────────────────────────
let currentIndex = 0;
let hls = null;
let isMuted = false;
let isFullscreen = false;
let currentLevels = [];
let currentQuality = -1; // -1 = AUTO
let hideTimer = null;
let extUrl = "";

const video     = document.getElementById("main-video");
const stateEl   = document.getElementById("video-state");
const stateText = document.getElementById("state-text");
const spinner   = document.getElementById("spinner");
const extBtn    = document.getElementById("ext-btn");
const muteBtn   = document.getElementById("mute-btn");
const qMenu     = document.getElementById("quality-menu");
const qBtn      = document.getElementById("quality-btn");
const chName    = document.getElementById("ch-name");
const catBadge  = document.getElementById("cat-badge");

// ── Init ─────────────────────────────────────────────────────
function init() {
  catBadge.textContent = category || "TV";
  buildChannelList();
  playChannel(0);
}

// ── Channel List ─────────────────────────────────────────────
function getCatEmoji(cat) {
  const m = { news:"📰", sports:"⚽", movies:"🎬", music:"🎵" };
  return m[cat.toLowerCase()] || "📺";
}

function buildChannelList() {
  const list = document.getElementById("ch-list");
  list.innerHTML = "";

  if (!allChannels.length) {
    list.innerHTML = `<p style="color:var(--muted);text-align:center;padding:20px;font-size:13px;">No channels available.</p>`;
    return;
  }

  allChannels.forEach((ch, i) => {
    const div = document.createElement("div");
    div.className = "ch-item" + (i === currentIndex ? " playing" : "");
    div.id = `ch-item-${i}`;
    div.innerHTML = `
      <div class="ch-icon">${getCatEmoji(category)}</div>
      <div class="ch-info">
        <div class="ch-title">${escHtml(ch.name)}</div>
        <div class="ch-sub">${category || "Live TV"}</div>
      </div>
      <div class="ch-live-badge">LIVE</div>
    `;
    div.onclick = () => playChannel(i);
    list.appendChild(div);
  });
}

function updateActiveChannel(idx) {
  document.querySelectorAll(".ch-item").forEach((el, i) => {
    el.classList.toggle("playing", i === idx);
  });
  // scroll into view
  const el = document.getElementById(`ch-item-${idx}`);
  if (el) el.scrollIntoView({ behavior:"smooth", block:"nearest" });
}

// ── Play Channel ─────────────────────────────────────────────
function playChannel(idx) {
  currentIndex = idx;
  const ch = allChannels[idx];
  if (!ch) return;

  extUrl = ch.url;
  chName.textContent = ch.name;
  updateActiveChannel(idx);
  updateInfoPanel(ch);
  loadStream(ch.url);
}

function loadStream(url) {
  extBtn.style.display = "none";
  showState("Loading stream...", true);
  destroyHls();

  if (!url) { showState("No stream URL.", false); return; }

  const isHLS = url.includes(".m3u8") || url.includes("m3u8");
  const isMp4 = url.toLowerCase().includes(".mp4");

  if (isHLS && Hls.isSupported()) {
    hls = new Hls({
      enableWorker: true,
      lowLatencyMode: true,
      backBufferLength: 30,
    });
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, (e, data) => {
      buildQualityMenu(data.levels);
      video.play().catch(() => {});
      hideState();
    });
    hls.on(Hls.Events.ERROR, (e, data) => {
      if (data.fatal) {
        showState("Stream error. Try another channel.", false);
        extBtn.style.display = "block";
      }
    });
  } else if (isHLS && video.canPlayType("application/vnd.apple.mpegurl")) {
    // Safari native HLS
    video.src = url;
    video.onloadedmetadata = () => { video.play().catch(()=>{}); hideState(); };
    video.onerror = () => { showState("Cannot load stream.", false); extBtn.style.display="block"; };
    buildQualityMenu([]);
  } else if (isMp4) {
    video.src = url;
    video.onloadedmetadata = () => { video.play().catch(()=>{}); hideState(); };
    video.onerror = () => { showState("Cannot load stream.", false); extBtn.style.display="block"; };
    buildQualityMenu([]);
  } else {
    // Non-embeddable (YouTube, etc.)
    showState("This stream opens externally.", false);
    extBtn.style.display = "block";
    buildQualityMenu([]);
  }
}

function destroyHls() {
  if (hls) { hls.destroy(); hls = null; }
  video.src = "";
  video.load();
  currentLevels = [];
  currentQuality = -1;
  qBtn.textContent = "AUTO";
  qMenu.innerHTML = "";
}

// ── State Display ────────────────────────────────────────────
function showState(txt, loading) {
  stateEl.classList.remove("hidden");
  stateText.textContent = txt;
  spinner.style.display = loading ? "block" : "none";
}
function hideState() { stateEl.classList.add("hidden"); }

// ── Quality Menu ─────────────────────────────────────────────
function buildQualityMenu(levels) {
  currentLevels = levels;
  qMenu.innerHTML = "";

  const auto = document.createElement("div");
  auto.className = "q-opt active";
  auto.textContent = "🔄 AUTO";
  auto.onclick = () => setQuality(-1);
  qMenu.appendChild(auto);

  levels.forEach((lvl, i) => {
    const label = lvl.height ? `${lvl.height}p` : `Level ${i+1}`;
    const opt = document.createElement("div");
    opt.className = "q-opt";
    opt.textContent = label;
    opt.onclick = () => setQuality(i);
    qMenu.appendChild(opt);
  });

  if (!levels.length) qBtn.style.display = "none";
  else qBtn.style.display = "";
}

function setQuality(idx) {
  currentQuality = idx;
  if (hls) hls.currentLevel = idx;
  qMenu.classList.remove("open");

  document.querySelectorAll(".q-opt").forEach((el, i) => {
    el.classList.toggle("active", i - 1 === idx || (idx === -1 && i === 0));
  });

  if (idx === -1) qBtn.textContent = "AUTO";
  else {
    const lvl = currentLevels[idx];
    qBtn.textContent = lvl && lvl.height ? `${lvl.height}p` : `L${idx+1}`;
  }
}

function toggleQualityMenu() {
  if (!currentLevels.length) { toast("Quality selection not available"); return; }
  qMenu.classList.toggle("open");
}

// ── Mute ─────────────────────────────────────────────────────
function toggleMute() {
  isMuted = !isMuted;
  video.muted = isMuted;
  muteBtn.textContent = isMuted ? "🔇" : "🔊";
  toast(isMuted ? "Muted" : "Unmuted");
}

// ── Fullscreen ───────────────────────────────────────────────
function toggleFullscreen() {
  const wrap = document.getElementById("video-wrap");

  if (!isFullscreen) {
    // Try native fullscreen first
    const el = wrap.requestFullscreen || wrap.webkitRequestFullscreen || wrap.mozRequestFullScreen;
    if (el) {
      (wrap.requestFullscreen || wrap.webkitRequestFullscreen).call(wrap).catch(()=>{});
    }
    // Fallback: CSS fullscreen
    wrap.classList.add("fullscreen-active");
    document.getElementById("fs-btn").textContent = "✕";
    isFullscreen = true;
  } else {
    const exitFs = document.exitFullscreen || document.webkitExitFullscreen;
    if (exitFs) exitFs.call(document).catch(()=>{});
    wrap.classList.remove("fullscreen-active");
    document.getElementById("fs-btn").textContent = "⛶";
    isFullscreen = false;
  }
}

document.addEventListener("fullscreenchange", () => {
  if (!document.fullscreenElement) {
    document.getElementById("video-wrap").classList.remove("fullscreen-active");
    document.getElementById("fs-btn").textContent = "⛶";
    isFullscreen = false;
  }
});

// ── External open ────────────────────────────────────────────
function openExternal() { TG.openLink(extUrl); }

// ── Tabs ─────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById(`tab-${tab}`).classList.add("active");
  document.getElementById("ch-list").style.display   = tab === "channels" ? "" : "none";
  document.getElementById("info-panel").style.display = tab === "info"     ? "" : "none";
}

function updateInfoPanel(ch) {
  const panel = document.getElementById("info-panel");
  panel.innerHTML = `
    <div class="info-row">
      <div class="info-label">Channel</div>
      <div class="info-val">${escHtml(ch.name)}</div>
    </div>
    <div class="divider"></div>
    <div class="info-row">
      <div class="info-label">Category</div>
      <div class="info-val">${getCatEmoji(category)} ${escHtml(category || "Live TV")}</div>
    </div>
    <div class="divider"></div>
    <div class="info-row">
      <div class="info-label">Status</div>
      <div class="info-val" style="color:var(--red)">🔴 Live</div>
    </div>
    <div class="divider"></div>
    <div class="info-row">
      <div class="info-label">Stream URL</div>
      <div class="info-url">${escHtml(ch.url)}</div>
    </div>
  `;
}

// ── Toast ────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 2000);
}

// ── Close quality menu on outside click ──────────────────────
document.addEventListener("click", e => {
  if (!document.getElementById("quality-wrap").contains(e.target)) {
    qMenu.classList.remove("open");
  }
});

// ── Helpers ──────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ── Start ────────────────────────────────────────────────────
init();
</script>
</body>
</html>
