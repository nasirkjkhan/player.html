<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>TV Live</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.12/dist/hls.min.js"></script>
<style>
:root{--r:#e94560;--dk:#0a0a0f;--c1:#12121a;--c2:#1a1a28;--br:#2a2a3a;--tx:#f0f0f0;--mt:#666;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--dk);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;}
#app{display:flex;flex-direction:column;height:100vh;}

/* HEADER */
#hdr{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:8px 12px;
  background:linear-gradient(135deg,#12121a,#1e1e2e);border-bottom:2px solid var(--r);z-index:20;}
#ldot{width:8px;height:8px;border-radius:50%;background:var(--r);flex-shrink:0;animation:bl 1.4s infinite;}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.25}}
#chnm{font-size:14px;font-weight:700;color:var(--r);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#ctbg{font-size:10px;padding:2px 7px;border-radius:20px;background:rgba(233,69,96,.12);
  border:1px solid rgba(233,69,96,.25);color:var(--r);flex-shrink:0;}
#spbtn{font-size:11px;padding:3px 9px;border-radius:20px;background:rgba(233,69,96,.15);
  border:1px solid rgba(233,69,96,.3);color:var(--r);text-decoration:none;flex-shrink:0;font-weight:600;}

/* VIDEO */
#vsec{flex-shrink:0;position:relative;background:#000;}
#vid{width:100%;display:block;height:clamp(210px, 38vh, 520px);background:#000;object-fit:contain;}

/* ── FULLSCREEN (CSS-based — works in ALL contexts) ── */
/* Triggered by body.fsm class — always applied on ⛶ click */
html.fsm, body.fsm{
  overflow:hidden !important;
  width:100vw !important;
  height:100vh !important;
}
body.fsm #app{
  display:flex !important;
  position:fixed !important;
  inset:0 !important;
  z-index:99990 !important;
  flex-direction:column !important;
  background:#000 !important;
}
/* Hide everything except video section */
body.fsm #hdr    { display:none !important; }
body.fsm #catbar { display:none !important; }
body.fsm #tabs   { display:none !important; }
body.fsm #content{ display:none !important; }
/* Video section fills ALL space */
body.fsm #vsec{
  flex:1 !important;
  position:relative !important;
  width:100vw !important;
  height:100% !important;
  min-height:0 !important;
  background:#000 !important;
}
/* Video fills the section completely, centered */
body.fsm #vid{
  position:absolute !important;
  top:0 !important; left:0 !important;
  width:100% !important;
  height:100% !important;
  max-width:100vw !important;
  max-height:100vh !important;
  object-fit:contain !important;
  background:#000 !important;
}
/* Controls pinned to bottom */
body.fsm #cbar{
  position:absolute !important;
  bottom:0 !important; left:0 !important; right:0 !important;
  z-index:100000 !important;
  background:linear-gradient(transparent,rgba(0,0,0,.92)) !important;
  padding:10px 16px !important;
}
body.fsm #vst   { z-index:100001 !important; }
body.fsm #fovbar{ z-index:100001 !important; }
body.fsm #iplay { z-index:100002 !important; }
/* Hint badge */
body.fsm #fs-hint{ display:flex !important; }
#fs-hint{
  display:none;
  position:fixed;top:12px;right:14px;z-index:100003;
  background:rgba(0,0,0,.6);color:rgba(255,255,255,.55);
  font-size:11px;padding:4px 10px;border-radius:20px;
  pointer-events:none;align-items:center;gap:5px;
}

/* PORTRAIT */
body.rot #vsec{position:fixed;top:0;left:0;z-index:99999;
  width:100vh;height:100vw;
  transform:rotate(90deg) translateX(0) translateY(-100%);
  transform-origin:top left;background:#000;display:flex;flex-direction:column;}
body.rot #vid{flex:1;width:100%;height:0!important;object-fit:contain;}
body.rot #cbar{position:relative;flex-shrink:0;}

/* CONTROLS */
#cbar{position:absolute;bottom:0;left:0;right:0;padding:7px 10px;
  background:linear-gradient(transparent,rgba(0,0,0,.92));display:flex;align-items:center;gap:7px;z-index:10;}
.cb{background:rgba(255,255,255,.12);border:none;border-radius:50%;width:34px;height:34px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:14px;
  flex-shrink:0;user-select:none;}
.cb:active{transform:scale(.87);background:rgba(233,69,96,.5);}
#qw{position:relative;}
#qbtn{border-radius:7px!important;width:auto!important;padding:0 9px;font-size:11px;font-weight:700;}
#qmenu{display:none;position:absolute;bottom:42px;left:0;background:#1a1a28;
  border:1px solid var(--br);border-radius:8px;overflow:hidden;min-width:90px;z-index:300;}
#qmenu.open{display:block;}
.qo{padding:8px 13px;font-size:12px;cursor:pointer;white-space:nowrap;}
.qo:hover,.qo:active{background:rgba(233,69,96,.18);}
.qo.active{color:var(--r);font-weight:700;}
#netlbl{font-size:10px;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,.07);color:var(--mt);flex-shrink:0;}
#livlbl{margin-left:auto;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--r);}

/* STATE */
#vst{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  text-align:center;pointer-events:none;z-index:15;width:85%;}
#spin{width:32px;height:32px;border:3px solid rgba(233,69,96,.18);border-top-color:var(--r);
  border-radius:50%;animation:sp .75s linear infinite;margin:0 auto 7px;}
@keyframes sp{to{transform:rotate(360deg)}}
#stxt{font-size:12px;color:var(--mt);}
#ssub{font-size:10px;color:#444;margin-top:3px;}
#vst.h{display:none;}
#fovbar{display:none;position:absolute;top:0;left:0;right:0;z-index:16;
  background:rgba(233,69,96,.14);border-bottom:1px solid rgba(233,69,96,.25);
  padding:5px 12px;font-size:11px;color:var(--r);text-align:center;}

/* iPhone play overlay */
#iplay{display:none;position:absolute;inset:0;align-items:center;justify-content:center;
  background:rgba(0,0,0,.55);z-index:20;flex-direction:column;gap:10px;cursor:pointer;}
#iplay.show{display:flex;}
#iplay-ic{width:56px;height:56px;background:rgba(233,69,96,.9);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:24px;}
#iplay-tx{color:#ccc;font-size:12px;}

/* CAT FILTER */
#catbar{flex-shrink:0;display:flex;gap:6px;padding:7px 10px;
  overflow-x:auto;background:var(--c1);border-bottom:1px solid var(--br);}
#catbar::-webkit-scrollbar{display:none;}
.cfbtn{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--br);
  background:transparent;color:var(--mt);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;}
.cfbtn.on{background:rgba(233,69,96,.15);border-color:rgba(233,69,96,.4);color:var(--r);}
.cfbtn:active{transform:scale(.95);}

/* TABS */
#tabs{flex-shrink:0;display:flex;border-bottom:1px solid var(--br);background:var(--c1);}
.tab{flex:1;padding:8px 4px;text-align:center;font-size:12px;font-weight:600;
  color:var(--mt);cursor:pointer;border-bottom:2px solid transparent;}
.tab.on{color:var(--r);border-bottom-color:var(--r);}

/* CONTENT */
#content{flex:1;overflow-y:auto;}
#content::-webkit-scrollbar{width:3px;}
#content::-webkit-scrollbar-thumb{background:var(--br);border-radius:3px;}
#chlist{padding:7px;}
.chi{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;
  cursor:pointer;border:1px solid transparent;margin-bottom:5px;}
.chi:active{background:var(--c2);}
.chi.pl{background:rgba(233,69,96,.09);border-color:rgba(233,69,96,.28);}
.chiico{width:36px;height:36px;border-radius:7px;background:var(--c2);
  display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.chi.pl .chiico{background:rgba(233,69,96,.18);}
.chinf{flex:1;min-width:0;}
.chtit{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.chi.pl .chtit{color:var(--r);}
.chcat{font-size:10px;color:var(--mt);margin-top:1px;}
.livbg{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;
  background:rgba(233,69,96,.13);color:var(--r);border:1px solid rgba(233,69,96,.28);flex-shrink:0;}
.errbg{font-size:9px;padding:2px 6px;border-radius:4px;
  background:rgba(80,80,80,.2);color:#555;border:1px solid #2a2a2a;flex-shrink:0;}

/* INFO */
#infopan{padding:13px;}
.ir{display:flex;gap:8px;margin-bottom:9px;}
.il{font-size:11px;color:var(--mt);width:78px;flex-shrink:0;}
.iv{font-size:13px;font-weight:600;}
.dv{height:1px;background:var(--br);margin:9px 0;}
.sl{display:inline-flex;align-items:center;gap:5px;color:var(--r);}
.sd{width:6px;height:6px;border-radius:50%;background:var(--r);animation:bl 1.4s infinite;}

/* LOADING SCREEN */
#ldscr{position:fixed;inset:0;background:var(--dk);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:999999;gap:14px;}
.lsi{font-size:48px;}
.lss{width:28px;height:28px;border:3px solid rgba(233,69,96,.2);border-top-color:var(--r);
  border-radius:50%;animation:sp .75s linear infinite;}
.lst{font-size:13px;color:var(--mt);}

/* TOAST */
#toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);
  background:rgba(15,15,25,.96);border:1px solid rgba(233,69,96,.4);color:#fff;
  padding:8px 16px;border-radius:20px;font-size:12px;opacity:0;pointer-events:none;
  transition:opacity .28s;z-index:999999;white-space:nowrap;max-width:88vw;text-align:center;}
#toast.show{opacity:1;}

/* ── DESKTOP responsive layout ─────────────────────────────── */
@media (min-width: 600px){
  #vid{height:clamp(300px, 45vh, 600px) !important;}
  #hdr{padding:10px 18px;}
  #chnm{font-size:16px;}
  #spbtn{font-size:12px;padding:4px 12px;}
  #catbar{padding:8px 14px;gap:8px;}
  .cfbtn{padding:6px 16px;font-size:12px;}
  .tab{padding:10px 6px;font-size:13px;}
  #chlist{padding:10px 12px;}
  .chi{padding:11px 14px;margin-bottom:6px;}
  .chiico{width:42px;height:42px;font-size:20px;}
  .chtit{font-size:14px;}
  .chcat{font-size:11px;}
  .cb{width:38px;height:38px;font-size:16px;}
}
@media (min-width: 900px){
  #vid{height:clamp(420px, 50vh, 680px) !important;}
  #hdr{padding:11px 22px;}
  #chnm{font-size:17px;}
  .cfbtn{padding:7px 18px;font-size:13px;}
  .chtit{font-size:15px;}
  .chi{padding:12px 16px;}
  .chiico{width:46px;height:46px;font-size:22px;}
}
@media (min-width:1200px){
  #vid{height:clamp(500px, 55vh, 780px) !important;}
}

/* Native fullscreen on video element itself */
#vid:-webkit-full-screen { width:100vw !important; height:100vh !important; object-fit:contain; background:#000; }
#vid:-moz-full-screen    { width:100vw !important; height:100vh !important; object-fit:contain; background:#000; }
#vid:-ms-fullscreen      { width:100vw !important; height:100vh !important; object-fit:contain; background:#000; }
#vid:fullscreen          { width:100vw !important; height:100vh !important; object-fit:contain; background:#000; }

/* Native fullscreen on vsec container */
#vsec:-webkit-full-screen { width:100vw !important; height:100vh !important; background:#000; display:flex; align-items:center; justify-content:center; }
#vsec:fullscreen          { width:100vw !important; height:100vh !important; background:#000; display:flex; align-items:center; justify-content:center; }
#vsec:-webkit-full-screen #vid { width:100vw !important; height:100vh !important; object-fit:contain; }
#vsec:fullscreen #vid          { width:100vw !important; height:100vh !important; object-fit:contain; }
#vsec:-webkit-full-screen #cbar { position:fixed; bottom:0; left:0; right:0; }
#vsec:fullscreen #cbar           { position:fixed; bottom:0; left:0; right:0; }

/* ── PICTURE-IN-PICTURE ─────────────────────────────────────── */
/* When video is in PiP mode, show a placeholder */
#pip-overlay{
  display:none;position:absolute;inset:0;background:rgba(0,0,0,.85);
  align-items:center;justify-content:center;flex-direction:column;gap:10px;
  z-index:50;cursor:pointer;
}
#pip-overlay.show{display:flex;}
#pip-overlay-icon{font-size:36px;}
#pip-overlay-txt{font-size:12px;color:var(--mt);text-align:center;padding:0 20px;}
#pip-overlay-btn{
  padding:8px 20px;background:var(--r);color:#fff;border:none;
  border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;margin-top:4px;
}
/* Hide PiP button if API not supported */
#pipbtn.hidden{display:none;}

/* ── BROWSER MODE BAR ───────────────────────────── */
#browser-bar{
  display:none;
  align-items:center;justify-content:space-between;
  padding:8px 14px;
  background:linear-gradient(135deg,#1a1a2e,#16213e);
  border-bottom:2px solid var(--r);
  font-size:12px;color:var(--tx);flex-shrink:0;
  position:relative;z-index:30;
}
#browser-bar .bb-logo{font-size:16px;font-weight:700;color:var(--r);}
#browser-bar .bb-link{
  font-size:11px;padding:4px 12px;border-radius:20px;
  background:rgba(233,69,96,.15);border:1px solid rgba(233,69,96,.3);
  color:var(--r);text-decoration:none;font-weight:600;
}
#browser-bar .bb-tag{font-size:10px;color:var(--mt);}

/* ── RECOMMENDED CHANNELS ───────────────────────── */
#rec-section{
  flex-shrink:0;
  background:var(--c1);
  border-bottom:1px solid var(--br);
  padding:8px 10px;
}
#rec-title{
  font-size:10px;font-weight:700;letter-spacing:.8px;
  color:var(--r);margin-bottom:7px;text-transform:uppercase;
}
#rec-row{
  display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;
}
#rec-row::-webkit-scrollbar{display:none;}
.rec-item{
  flex-shrink:0;display:flex;flex-direction:column;
  align-items:center;gap:4px;cursor:pointer;
  width:58px;
}
.rec-icon{
  width:46px;height:46px;border-radius:10px;
  background:var(--c2);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;border:2px solid transparent;
  transition:border-color .2s;
}
.rec-item.active .rec-icon{border-color:var(--r);}
.rec-item:active .rec-icon{border-color:var(--r);}
.rec-name{
  font-size:9px;color:var(--mt);text-align:center;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  width:56px;
}
.rec-item.active .rec-name{color:var(--r);}
#rec-section.empty{display:none;}
</style>
</head>
<body>

<div id="ldscr">
  <div class="lsi">📺</div>
  <div class="lss"></div>
  <div class="lst">Loading channels...</div>
</div>

<div id="app" style="display:none">
  <!-- Shown only in browser, hidden in Telegram Mini App -->
  <div id="browser-bar">
    <div class="bb-logo">FIFA Live TV</div>
    <div class="bb-tag">Live Streaming</div>
    <a class="bb-link" href="https://t.me/LiveTv_V1Bot" target="_blank">Open in Telegram</a>
  </div>
  <div id="hdr">
    <div id="ldot"></div>
    <div id="chnm">Loading...</div>
    <div id="ctbg">TV</div>
    <a id="spbtn" href="https://t.me/FifaLiveTvChat" target="_blank">💬 Support</a>
  </div>

  <!-- Recommended channels horizontal strip -->
  <div id="rec-section" class="empty">
    <div id="rec-title">Recommended</div>
    <div id="rec-row"></div>
  </div>

  <div id="vsec">
    <div id="fovbar"></div>
    <video id="vid" playsinline webkit-playsinline preload="auto"></video>
    <div id="vst">
      <div id="spin"></div>
      <div id="stxt">Connecting...</div>
      <div id="ssub"></div>
    </div>
    <!-- iPhone tap-to-play overlay -->
    <div id="iplay" onclick="iphonePlay()">
      <div id="iplay-ic">▶</div>
      <div id="iplay-tx">Tap to play</div>
    </div>
    <div id="fs-hint">Press Esc to exit fullscreen</div>
    <!-- PiP overlay shown while video is in mini player -->
    <div id="pip-overlay" onclick="returnFromPiP()">
      <div id="pip-overlay-icon">📺</div>
      <div id="pip-overlay-txt">Playing in Mini Player<br>Tap to return</div>
      <button id="pip-overlay-btn" onclick="returnFromPiP()">↩ Return to Player</button>
    </div>
    <div id="cbar">
      <button class="cb" id="mbtn" onclick="toggleMute()">🔊</button>
      <div id="qw">
        <button class="cb" id="qbtn" onclick="toggleQ()">AUTO</button>
        <div id="qmenu"></div>
      </div>
      <span id="netlbl"></span>
      <button class="cb" id="pbtn" onclick="togglePortrait()">⟳</button>
      <button class="cb" id="pipbtn" onclick="togglePiP()" title="Mini Player">⊡</button>
      <button class="cb" id="fbtn" onclick="toggleFS()">⛶</button>
      <span id="livlbl">● LIVE</span>
    </div>
  </div>

  <div id="catbar"></div>

  <div id="tabs">
    <div class="tab on" id="t-ch" onclick="switchTab('ch')">📺 Channels</div>
    <div class="tab"    id="t-in" onclick="switchTab('in')">ℹ️ Info</div>
  </div>
  <div id="content">
    <div id="chlist"></div>
    <div id="infopan" style="display:none"></div>
  </div>
</div>
<div id="toast"></div>

<script>
// ── Telegram ──────────────────────────────────────────────────
// Works in BOTH Telegram Mini App AND normal browser
const TG = window.Telegram && window.Telegram.WebApp;
const isTelegram = !!(TG && TG.initData);
const isBrowser  = !isTelegram;

if(isTelegram){
  TG.ready();
  TG.expand();
  if(TG.requestFullscreen)  TG.requestFullscreen();
  if(TG.setHeaderColor)     TG.setHeaderColor("#0a0a0f");
  if(TG.setBackgroundColor) TG.setBackgroundColor("#0a0a0f");
  if(TG.BackButton && TG.BackButton.isVisible) TG.BackButton.hide();
}

// Browser mode: show a header bar with bot link
if(isBrowser){
  document.addEventListener("DOMContentLoaded", function(){
    const bar = document.getElementById("browser-bar");
    if(bar) bar.style.display = "flex";
  });
}

// ── Detect iPhone/iOS ─────────────────────────────────────────
const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

// ── URL Params ────────────────────────────────────────────────
const P       = new URLSearchParams(location.search);
const initUrl = decodeURIComponent(P.get("url")  || "");
const initNm  = decodeURIComponent(P.get("name") || "Live TV");
const initCat = decodeURIComponent(P.get("cat")  || "");

// ── CHANNELS JSON URL ─────────────────────────────────────────
// This file lives on your GitHub Pages repo
const JSON_URL = "https://nasirkjkhan.github.io/player.html/channels.json";

// ── State ─────────────────────────────────────────────────────
let ALL      = []; // flat [{name,url,cat}]
let CUR      = 0;
let hls      = null;
let muted    = false;
let fsOn     = false;
let natFS    = false;
let rotOn    = false;
let levels   = [];
let failed   = new Set();
let errCnt   = 0;
let foTimer  = null;
let strats   = [];
let stIdx    = 0;
let stlTimer = null;
let lastT    = -1;
let stlCnt   = 0;
let activeCat= "all";

// ── Elements ──────────────────────────────────────────────────
const vid   = document.getElementById("vid");
const vstEl = document.getElementById("vst");
const stxtEl= document.getElementById("stxt");
const ssubEl= document.getElementById("ssub");
const spnEl = document.getElementById("spin");
const mbtn  = document.getElementById("mbtn");
const qmenu = document.getElementById("qmenu");
const qbtn  = document.getElementById("qbtn");
const chnmEl= document.getElementById("chnm");
const ctbgEl= document.getElementById("ctbg");
const netlbl= document.getElementById("netlbl");
const fbtn  = document.getElementById("fbtn");
const pbtn  = document.getElementById("pbtn");
const fbar  = document.getElementById("fovbar");
const iplay = document.getElementById("iplay");

// ── FETCH channels.json ───────────────────────────────────────
async function boot(){
  let fetched = false;
  try{
    const r = await fetch(JSON_URL + "?_=" + Date.now());
    if(r.ok){
      const j = await r.json();
      ["news","sports","movies","music"].forEach(cat=>{
        const arr = j[cat] || [];
        arr.forEach(ch=>{
          if(!ch.hidden) ALL.push({name:ch.name||"", url:ch.url||"", cat:cat});
        });
      });
      if(ALL.length) fetched = true;
    }
  }catch(e){}

  // Fallback: use URL param channel if JSON empty or failed
  if(!ALL.length && initUrl){
    ALL = [{name:initNm, url:initUrl, cat:initCat}];
  }

  // Load recommended channels from same JSON
  try{
    const rj = await fetch(JSON_URL + "?_r=" + Date.now());
    if(rj.ok){
      const rd = await rj.json();
      window.RECS = rd.recommended || [];
    } else { window.RECS = []; }
  }catch(e){ window.RECS = []; }

  // Hide loader, show app
  document.getElementById("ldscr").style.display = "none";
  document.getElementById("app").style.display   = "flex";

  // Browser mode: show browser bar
  if(isBrowser){
    const bar = document.getElementById("browser-bar");
    if(bar) bar.style.display = "flex";
  }

  buildCatBar();
  buildList();
  initPiP(); // set up Picture-in-Picture
  buildRecommended(); // show recommended channels strip

  // Start on the channel that was tapped in bot
  let si = ALL.findIndex(c => c.url === initUrl);
  if(si < 0) si = 0;
  play(si);
}

// ── Recommended Channels Strip ────────────────────
function buildRecommended(){
  const sec = document.getElementById("rec-section");
  const row = document.getElementById("rec-row");
  if(!sec || !row) return;

  // Get recommended from channels.json (already fetched into allChannels)
  // They are flagged in channels.json under "recommended" key
  // We stored them separately — read from window.RECS set during fetch
  const recs = window.RECS || [];
  if(!recs.length){ sec.classList.add("empty"); return; }

  sec.classList.remove("empty");
  row.innerHTML = "";

  recs.forEach((ch, i)=>{
    const div = document.createElement("div");
    div.className = "rec-item";
    div.id = "rec-" + i;
    div.innerHTML =
      '<div class="rec-icon">' + cEmoji(ch.cat||"sports") + '</div>'+
      '<div class="rec-name">' + esc(ch.name) + '</div>';
    div.onclick = ()=>{
      // Find in ALL channels and play
      const idx = ALL.findIndex(c => c.url === ch.url);
      if(idx >= 0){
        // Switch category filter to show this channel's category
        activeCat = ch.cat || "all";
        buildCatBar();
        buildList();
        play(idx);
      } else {
        // Add to ALL temporarily and play
        ALL.unshift({name:ch.name, url:ch.url, cat:ch.cat||"sports"});
        activeCat = ch.cat || "all";
        buildCatBar();
        buildList();
        play(0);
      }
      // Mark active
      document.querySelectorAll(".rec-item").forEach(el=>el.classList.remove("active"));
      div.classList.add("active");
    };
    row.appendChild(div);
  });
}

boot();

// ── Helpers ───────────────────────────────────────────────────
const CE = {news:"📰",sports:"⚽",movies:"🎬",music:"🎵"};
function cEmoji(cat){ return CE[(cat||"").toLowerCase()] || "📺"; }
function cap(s){ return s ? s[0].toUpperCase()+s.slice(1) : s; }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// ── Category bar ──────────────────────────────────────────────
function buildCatBar(){
  const bar = document.getElementById("catbar");
  bar.innerHTML = "";

  // "All Channels" button
  const allBtn = document.createElement("button");
  allBtn.className = "cfbtn" + (activeCat==="all"?" on":"");
  allBtn.textContent = "🌐 All Channels";
  allBtn.onclick = ()=>{ activeCat="all"; buildCatBar(); buildList(); };
  bar.appendChild(allBtn);

  // One button per category that has channels
  const cats = [...new Set(ALL.map(c=>c.cat).filter(Boolean))];
  cats.forEach(cat=>{
    const btn = document.createElement("button");
    btn.className = "cfbtn" + (activeCat===cat?" on":"");
    btn.textContent = cEmoji(cat)+" "+cap(cat);
    btn.onclick = ()=>{ activeCat=cat; buildCatBar(); buildList(); };
    bar.appendChild(btn);
  });
}

// ── Channel list ──────────────────────────────────────────────
function visible(){
  return ALL.filter(c =>
    activeCat==="all" || (c.cat||"").toLowerCase()===activeCat.toLowerCase()
  );
}

function buildList(){
  const list = document.getElementById("chlist");
  list.innerHTML = "";
  const vis = visible();

  if(!vis.length){
    list.innerHTML = `<p style="color:var(--mt);text-align:center;padding:20px;font-size:13px;">No channels.</p>`;
    return;
  }

  vis.forEach(ch=>{
    const i = ALL.indexOf(ch);
    const d = document.createElement("div");
    d.className = "chi"+(i===CUR?" pl":"");
    d.id = "ci"+i;
    const badge = failed.has(i)
      ? `<div class="errbg">⚠</div>`
      : `<div class="livbg">LIVE</div>`;
    d.innerHTML =
      `<div class="chiico">${cEmoji(ch.cat)}</div>`+
      `<div class="chinf">`+
        `<div class="chtit">${esc(ch.name)}</div>`+
        `<div class="chcat">${cEmoji(ch.cat)} ${esc(cap(ch.cat)||"Live TV")}</div>`+
      `</div>`+badge;
    d.onclick = ()=>{ failed.delete(i); play(i); };
    list.appendChild(d);
  });
}

function markActive(idx){
  document.querySelectorAll(".chi").forEach(el=>{
    const i = parseInt(el.id.replace("ci",""));
    el.classList.toggle("pl", i===idx);
  });
  const el = document.getElementById("ci"+idx);
  if(el) el.scrollIntoView({behavior:"smooth",block:"nearest"});
}

// ── Play channel ──────────────────────────────────────────────
function play(idx){
  clearTimeout(foTimer);
  if(idx<0||idx>=ALL.length) return;
  CUR=idx; errCnt=0;
  const ch=ALL[idx];
  chnmEl.textContent = ch.name;
  ctbgEl.textContent = cap(ch.cat)||"TV";
  markActive(idx);
  updateInfo(ch);
  hideFBar();
  iplay.classList.remove("show");
  loadStream(ch.url);
}

// ── Stream strategy detection ─────────────────────────────────
function getStrats(url){
  const u=(url||"").toLowerCase().split("?")[0];
  if(u.includes(".m3u8"))   return ["hls"];
  if(u.endsWith(".ts"))     return ["hls","direct"];
  if(u.endsWith(".mp4")&&(u.includes("/live/")||u.includes("/dash/")||u.includes("cdn")))
                             return ["direct","hls"];
  if(u.endsWith(".mp4"))    return ["direct","hls"];
  if(u.includes(".php"))    return ["hls","direct"];
  return ["hls","direct"];
}

// ── Load stream ───────────────────────────────────────────────
function loadStream(url){
  showSt("Connecting...",true,"");
  destroyHls();
  if(!url){ showSt("No URL.",false,""); return; }
  strats = getStrats(url);
  stIdx  = 0;
  tryNext(url);
}

function tryNext(url){
  if(stIdx>=strats.length){ onFail("All formats failed"); return; }
  const s=strats[stIdx];
  showSt("Connecting...",true, s==="hls"?"Trying HLS…":"Trying direct…");
  s==="hls" ? tryHLS(url) : tryDirect(url);
}

function tryHLS(url){
  destroyHls();
  if(Hls.isSupported()){
    hls = new Hls({
      enableWorker:true, startLevel:-1,
      abrEwmaDefaultEstimate:500000, abrBandWidthFactor:.8, abrBandWidthUpFactor:.7,
      maxBufferLength:20, maxMaxBufferLength:40, backBufferLength:10,
      manifestLoadingMaxRetry:2, levelLoadingMaxRetry:2, fragLoadingMaxRetry:2,
      manifestLoadingRetryDelay:600,
      xhrSetup: xhr=>{ xhr.withCredentials=false; }
    });
    hls.loadSource(url);
    hls.attachMedia(vid);
    hls.on(Hls.Events.MANIFEST_PARSED,(e,d)=>{
      buildQMenu(d.levels);
      hls.currentLevel = -1;
      const p = vid.play();
      if(p && p.catch){
        p.catch(()=>{
          // Autoplay blocked (common on iOS)
          if(isIOS){ iplay.classList.add("show"); hideSt(); }
          else { vid.muted=true; mbtn.textContent="🔇"; muted=true; vid.play().catch(()=>{}); }
        });
      }
      hideSt(); updateNetLbl(); errCnt=0;
    });
    hls.on(Hls.Events.LEVEL_SWITCHED, ()=>updateNetLbl());
    hls.on(Hls.Events.ERROR,(e,d)=>{
      if(d.fatal){
        if(d.type===Hls.ErrorTypes.NETWORK_ERROR && errCnt<2){
          errCnt++; showSt("Reconnecting...",true,"Network issue"); hls.startLoad();
        } else if(d.type===Hls.ErrorTypes.MEDIA_ERROR && errCnt<2){
          errCnt++; showSt("Recovering...",true,""); hls.recoverMediaError();
        } else { stIdx++; tryNext(url); }
      }
    });
  } else if(vid.canPlayType("application/vnd.apple.mpegurl")){
    // Safari/iOS native HLS
    vid.src = url;
    vid.onloadedmetadata = ()=>{
      buildQMenu([]);
      const p = vid.play();
      if(p && p.catch) p.catch(()=>{ iplay.classList.add("show"); });
      hideSt();
    };
    vid.onerror = ()=>{ stIdx++; tryNext(url); };
  } else { stIdx++; tryNext(url); }
}

function tryDirect(url){
  destroyHls();
  vid.src = url;
  let ok = false;
  const t = setTimeout(()=>{ if(!ok){ stIdx++; tryNext(url); } }, 9000);
  vid.oncanplay = ()=>{
    ok=true; clearTimeout(t);
    const p = vid.play();
    if(p && p.catch) p.catch(()=>{
      if(isIOS){ iplay.classList.add("show"); hideSt(); }
      else { vid.muted=true; mbtn.textContent="🔇"; muted=true; vid.play().catch(()=>{}); }
    });
    hideSt(); buildQMenu([]); errCnt=0;
  };
  vid.onerror = ()=>{ clearTimeout(t); stIdx++; tryNext(url); };
}

// iPhone tap-to-play
function iphonePlay(){
  iplay.classList.remove("show");
  vid.play().catch(()=>{});
}

// ── Failover ──────────────────────────────────────────────────
function onFail(reason){
  failed.add(CUR); buildList();
  const next = findNext();
  if(next===-1){ showSt("No streams available",false,"All channels offline"); return; }
  const nm = ALL[CUR]?.name || "Channel";
  showFBar(`⚡ "${nm}" unavailable — switching...`);
  showSt("Switching...",true,"");
  foTimer = setTimeout(()=>{ hideFBar(); play(next); }, 2800);
}
function findNext(){
  for(let i=1;i<=ALL.length;i++){
    const idx=(CUR+i)%ALL.length;
    if(!failed.has(idx)) return idx;
  }
  return -1;
}

// ── Stall detection ───────────────────────────────────────────
function startStall(){
  stopStall(); lastT=-1; stlCnt=0;
  stlTimer=setInterval(()=>{
    if(vid.paused||vid.ended||vid.readyState<2) return;
    if(vid.currentTime===lastT){ if(++stlCnt>=3){ stopStall(); onFail("stalled"); } }
    else { stlCnt=0; lastT=vid.currentTime; }
  },3000);
}
function stopStall(){ clearInterval(stlTimer); stlTimer=null; }
vid.addEventListener("playing", ()=>{ startStall(); errCnt=0; iplay.classList.remove("show"); });
vid.addEventListener("error",   ()=>{ if(!hls) onFail("video error"); });

function destroyHls(){
  stopStall();
  if(hls){ hls.destroy(); hls=null; }
  vid.removeAttribute("src"); vid.load();
  vid.oncanplay=null; vid.onerror=null; vid.onloadedmetadata=null;
  levels=[]; qbtn.textContent="AUTO"; qmenu.innerHTML=""; netlbl.textContent="";
}

// ── State display ─────────────────────────────────────────────
function showSt(t,l,s){ vstEl.classList.remove("h"); stxtEl.textContent=t; ssubEl.textContent=s||""; spnEl.style.display=l?"block":"none"; }
function hideSt()      { vstEl.classList.add("h"); }
function showFBar(m)   { fbar.textContent=m; fbar.style.display="block"; }
function hideFBar()    { fbar.style.display="none"; }

// ── Quality ───────────────────────────────────────────────────
function buildQMenu(lvls){
  levels=lvls; qmenu.innerHTML="";
  const a=document.createElement("div"); a.className="qo active"; a.textContent="🔄 AUTO"; a.onclick=()=>setQ(-1); qmenu.appendChild(a);
  [...lvls].sort((a,b)=>(b.height||0)-(a.height||0)).forEach(lv=>{
    const orig=lvls.indexOf(lv); const lbl=lv.height?lv.height+"p":"Lvl "+(orig+1);
    const o=document.createElement("div"); o.className="qo"; o.textContent=lbl; o.onclick=()=>setQ(orig); qmenu.appendChild(o);
  });
  qbtn.style.display=lvls.length?"":"none";
}
function setQ(idx){
  if(hls) hls.currentLevel=idx; qmenu.classList.remove("open");
  document.querySelectorAll(".qo").forEach((el,i)=>el.classList.toggle("active",i===0&&idx===-1));
  qbtn.textContent=idx===-1?"AUTO":(levels[idx]?.height?levels[idx].height+"p":"AUTO");
  updateNetLbl();
}
function toggleQ(){ if(!levels.length){toast("Quality N/A");return;} qmenu.classList.toggle("open"); }
function updateNetLbl(){
  if(!hls){netlbl.textContent="";return;}
  const l=hls.currentLevel, lv=levels[l];
  if(l<0||!lv){netlbl.textContent="AUTO";return;}
  const h=lv.height||0;
  netlbl.textContent=h>=1080?"1080p":h>=720?"720p":h>=480?"480p":h>=360?"360p":h>0?h+"p":"AUTO";
}

// ── Mute ──────────────────────────────────────────────────────
function toggleMute(){ muted=!muted; vid.muted=muted; mbtn.textContent=muted?"🔇":"🔊"; toast(muted?"🔇 Muted":"🔊 Sound On"); }

// ── Portrait ──────────────────────────────────────────────────
function togglePortrait(){
  rotOn=!rotOn; document.body.classList.toggle("rot",rotOn);
  pbtn.textContent=rotOn?"↺":"⟳";
  if(rotOn&&(fsOn||natFS)) exitFS();
  toast(rotOn?"📱 Portrait — tap ↺ to restore":"↩️ Normal view");
}

// ── Picture-in-Picture (Mini Player) ─────────────────────────
// Uses browser native PiP API — works on Chrome, Edge, Safari, Firefox
// Falls back to a floating mini overlay for unsupported browsers

let pipActive = false;

function initPiP(){
  const pipBtn = document.getElementById("pipbtn");
  // Hide button if PiP not supported at all
  if(!document.pictureInPictureEnabled && !vid.webkitSupportsPresentationMode){
    if(pipBtn) pipBtn.classList.add("hidden");
    return;
  }

  // Track PiP enter/exit events
  vid.addEventListener("enterpictureinpicture", ()=>{
    pipActive = true;
    document.getElementById("pipbtn").textContent = "⊞";
    document.getElementById("pip-overlay").classList.add("show");
    toast("📺 Mini Player ON");
  });

  vid.addEventListener("leavepictureinpicture", ()=>{
    pipActive = false;
    document.getElementById("pipbtn").textContent = "⊡";
    document.getElementById("pip-overlay").classList.remove("show");
  });
}

async function togglePiP(){
  // If already in PiP → exit PiP
  if(document.pictureInPictureElement){
    try{
      await document.exitPictureInPicture();
    }catch(e){ toast("Could not exit mini player"); }
    return;
  }

  // Safari / iOS WebKit PiP
  if(vid.webkitSupportsPresentationMode && typeof vid.webkitSetPresentationMode === "function"){
    const mode = vid.webkitPresentationMode === "picture-in-picture" ? "inline" : "picture-in-picture";
    vid.webkitSetPresentationMode(mode);
    pipActive = (mode === "picture-in-picture");
    document.getElementById("pipbtn").textContent = pipActive ? "⊞" : "⊡";
    if(pipActive){
      document.getElementById("pip-overlay").classList.add("show");
      toast("📺 Mini Player ON — continue browsing!");
    } else {
      document.getElementById("pip-overlay").classList.remove("show");
    }
    return;
  }

  // Standard PiP API (Chrome, Edge, Firefox)
  if(document.pictureInPictureEnabled){
    try{
      // Video must be playing for PiP to work
      if(vid.paused){ vid.play().catch(()=>{}); }
      await vid.requestPictureInPicture();
      toast("📺 Mini Player ON — continue browsing!");
    }catch(e){
      // PiP blocked (autoplay policy etc.) — use floating fallback
      useFloatingFallback();
    }
    return;
  }

  // No PiP API at all → floating fallback
  useFloatingFallback();
}

function returnFromPiP(){
  document.getElementById("pip-overlay").classList.remove("show");
  if(document.pictureInPictureElement){
    document.exitPictureInPicture().catch(()=>{});
  }
  if(vid.webkitPresentationMode === "picture-in-picture"){
    vid.webkitSetPresentationMode("inline");
  }
  pipActive = false;
  document.getElementById("pipbtn").textContent = "⊡";
}

// Floating mini player fallback for unsupported browsers
function useFloatingFallback(){
  // If floating player already exists, remove it
  const existing = document.getElementById("float-pip");
  if(existing){ existing.remove(); pipActive=false; document.getElementById("pipbtn").textContent="⊡"; return; }

  pipActive = true;
  document.getElementById("pipbtn").textContent = "⊞";

  const fp = document.createElement("div");
  fp.id = "float-pip";
  fp.style.cssText = `
    position:fixed;bottom:70px;right:12px;width:200px;height:115px;
    background:#000;border-radius:10px;overflow:hidden;
    box-shadow:0 4px 20px rgba(0,0,0,.7);z-index:999999;
    cursor:move;border:2px solid rgba(233,69,96,.5);
  `;

  // Clone video source into a new small video element
  const miniVid = document.createElement("video");
  miniVid.style.cssText = "width:100%;height:100%;object-fit:contain;";
  miniVid.muted = false;
  miniVid.autoplay = true;
  miniVid.src = vid.src;
  if(window.hls){
    // HLS streams: just show a notice, can't clone HLS easily
    fp.innerHTML = `<div style="color:#fff;font-size:11px;text-align:center;padding:10px;line-height:1.4;">
      📺 Playing in background<br><span style="color:#e94560;font-size:10px;">Tap here to return</span></div>`;
  } else {
    fp.appendChild(miniVid);
  }

  // Close button
  const closeBtn = document.createElement("button");
  closeBtn.textContent = "✕";
  closeBtn.style.cssText = `
    position:absolute;top:4px;right:6px;background:rgba(233,69,96,.8);
    border:none;color:#fff;border-radius:50%;width:20px;height:20px;
    font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;
  `;
  closeBtn.onclick = ()=>{ fp.remove(); pipActive=false; document.getElementById("pipbtn").textContent="⊡"; };
  fp.appendChild(closeBtn);

  // Drag to move
  let isDragging=false, dragX=0, dragY=0;
  fp.addEventListener("mousedown", e=>{
    if(e.target===closeBtn) return;
    isDragging=true;
    dragX=e.clientX-fp.offsetLeft;
    dragY=e.clientY-fp.offsetTop;
  });
  document.addEventListener("mousemove", e=>{
    if(!isDragging) return;
    fp.style.left = (e.clientX-dragX)+"px";
    fp.style.top  = (e.clientY-dragY)+"px";
    fp.style.right = "auto"; fp.style.bottom = "auto";
  });
  document.addEventListener("mouseup", ()=>{ isDragging=false; });

  // Touch drag for mobile
  fp.addEventListener("touchstart", e=>{
    if(e.target===closeBtn) return;
    const t=e.touches[0];
    dragX=t.clientX-fp.offsetLeft; dragY=t.clientY-fp.offsetTop;
  },{passive:true});
  fp.addEventListener("touchmove", e=>{
    const t=e.touches[0];
    fp.style.left=(t.clientX-dragX)+"px";
    fp.style.top=(t.clientY-dragY)+"px";
    fp.style.right="auto"; fp.style.bottom="auto";
  },{passive:true});

  document.body.appendChild(fp);
  toast("📺 Mini Player — drag to move, ✕ to close");
}

// ── Fullscreen ────────────────────────────────────────────────
// Uses CSS-based fullscreen which works reliably in ALL contexts:
// Telegram Desktop, Telegram Web, Telegram Mobile, and normal browsers.
// The CSS body.fsm class hides all UI and makes the video fill 100vw/100vh.
// Native browser fullscreen API is attempted first as a bonus on desktop.

function toggleFS(){
  if(rotOn){ toast("Exit portrait first"); return; }

  // If already in any fullscreen mode → EXIT
  if(fsOn || natFS || document.fullscreenElement || document.webkitFullscreenElement){
    doExitFS();
    return;
  }

  // ENTER fullscreen:
  // Step 1 — always apply CSS fullscreen immediately (works everywhere)
  enterCssFS();

  // Step 2 — also try native browser fullscreen API (bonus for desktop)
  // We try vsec first (video container), then documentElement
  const targets = [
    document.getElementById("vsec"),
    document.documentElement
  ];
  let requested = false;
  for(const el of targets){
    const fn = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
    if(fn){
      try{
        fn.call(el);
        requested = true;
        break;
      }catch(e){}
    }
  }
}

function enterCssFS(){
  fsOn = true;
  document.documentElement.classList.add("fsm"); // html element
  document.body.classList.add("fsm");            // body element
  fbtn.textContent = "✕";
  const hint = document.getElementById("fs-hint");
  if(hint) hint.style.display = "flex";
  toast("📺 Fullscreen ON — tap ✕ to exit");
}

function exitCssFS(){
  fsOn = false;
  document.documentElement.classList.remove("fsm");
  document.body.classList.remove("fsm");
  fbtn.textContent = "⛶";
  const hint = document.getElementById("fs-hint");
  if(hint) hint.style.display = "none";
}

function doExitFS(){
  // Exit native fullscreen if active
  const exitFn = document.exitFullscreen || document.webkitExitFullscreen || document.mozCancelFullScreen || document.msExitFullscreen;
  if(exitFn && (document.fullscreenElement || document.webkitFullscreenElement)){
    try{ exitFn.call(document); }catch(e){}
  }
  // Always also exit CSS fullscreen
  exitCssFS();
  natFS = false;
}

function exitNatFS(){ doExitFS(); }
function exitFS(){ doExitFS(); }

// Sync state when native fullscreen changes
["fullscreenchange","webkitfullscreenchange","mozfullscreenchange","MSFullscreenChange"].forEach(ev=>{
  document.addEventListener(ev, ()=>{
    const isNative = !!(document.fullscreenElement || document.webkitFullscreenElement);
    if(isNative){
      natFS = true;
      document.documentElement.classList.add("fsm");
      document.body.classList.add("fsm");
      fbtn.textContent = "✕";
    } else {
      natFS = false;
      if(!fsOn){
        document.documentElement.classList.remove("fsm");
        document.body.classList.remove("fsm");
        fbtn.textContent = "⛶";
        const hint = document.getElementById("fs-hint");
        if(hint) hint.style.display = "none";
      }
    }
  });
});

document.addEventListener("keydown", e=>{
  if(e.key === "Escape"){
    if(fsOn || natFS) doExitFS();
    if(rotOn){ rotOn=false; document.body.classList.remove("rot"); pbtn.textContent="⟳"; }
  }
});

// ── Tabs ──────────────────────────────────────────────────────
function switchTab(t){
  document.querySelectorAll(".tab").forEach(el=>el.classList.remove("on"));
  document.getElementById("t-"+t).classList.add("on");
  document.getElementById("chlist").style.display  = t==="ch"?"":"none";
  document.getElementById("infopan").style.display = t==="in"?"":"none";
}

    `<div class="dv"></div>`+

// ── Toast ─────────────────────────────────────────────────────
function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove("show"),2300);
}
document.addEventListener("click",e=>{ if(!document.getElementById("qw").contains(e.target)) qmenu.classList.remove("open"); });
