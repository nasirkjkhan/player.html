<script>
const TG = window.Telegram?.WebApp;
if(TG){TG.ready();TG.expand();}

// ── CHANNELS JSON URL — update this if your GitHub username changes ──
const CHANNELS_JSON_URL = "https://nasirkjkhan.github.io/player.html/channels.json";

// ── URL Params (short — only current channel info) ──
const P        = new URLSearchParams(location.search);
const initUrl  = decodeURIComponent(P.get("url")  || "");
const initName = decodeURIComponent(P.get("name") || "Live TV");
const initCat  = decodeURIComponent(P.get("cat")  || "");

// ── State ──
let allChannels  = []; // flat: [{name,url,cat}]
let currentIndex = 0;
let hlsInst      = null;
let isMuted      = false;
let fsActive     = false;
let nativeFsActive = false;
let rotated      = false;
let currentLevels = [];
let failedSet    = new Set();
let errorCount   = 0;
let failoverTimer = null;
let strategyIndex = 0;
let strategies   = [];
let activeFilter = "all";
let stallTimer   = null;
let lastTime     = -1;
let stallCount   = 0;

// ── Elements ──
const video    = document.getElementById("main-video");
const stateEl  = document.getElementById("video-state");
const stTxt    = document.getElementById("st-txt");
const stSub    = document.getElementById("st-sub");
const spinEl   = document.getElementById("spinner");
const muteBtn  = document.getElementById("mute-btn");
const qMenu    = document.getElementById("q-menu");
const qBtn     = document.getElementById("q-btn");
const chNameEl = document.getElementById("ch-name");
const catBadge = document.getElementById("cat-badge");
const netLbl   = document.getElementById("net-lbl");
const fsBtn    = document.getElementById("fs-btn");
const fBar     = document.getElementById("failover-bar");
const portBtn  = document.getElementById("portrait-btn");

// ── FETCH channels.json from GitHub then init ──
async function fetchAndInit(){
  try {
    const res = await fetch(CHANNELS_JSON_URL + "?t=" + Date.now());
    const json = await res.json();
    // Flatten all categories into single array
    const cats = ["news","sports","movies","music"];
    cats.forEach(cat => {
      const list = json[cat] || [];
      list.forEach(ch => {
        if(!ch.hidden) allChannels.push({name:ch.name, url:ch.url, cat:cat});
      });
    });
  } catch(e) {
    // Fallback: use only the channel from URL params if JSON fetch fails
    if(initUrl) allChannels = [{name:initName, url:initUrl, cat:initCat}];
  }

  // If still empty, use URL param channel
  if(!allChannels.length && initUrl){
    allChannels = [{name:initName, url:initUrl, cat:initCat}];
  }

  // Hide loading screen, show app
  document.getElementById("loading-screen").style.display = "none";
  document.getElementById("app").style.display = "flex";

  buildCatFilter();
  buildChannelList();

  // Find and play the channel that was clicked in bot
  let startIdx = allChannels.findIndex(c => c.url === initUrl);
  if(startIdx < 0) startIdx = 0;
  playChannel(startIdx);
}

fetchAndInit();

// ── Helpers ──
function catEmoji(cat){
  return {news:"📰",sports:"⚽",movies:"🎬",music:"🎵"}[(cat||"").toLowerCase()]||"📺";
}
function cap(s){ return s?s[0].toUpperCase()+s.slice(1):s; }
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

// ── Category filter ──
function buildCatFilter(){
  const div = document.getElementById("cat-filter");
  div.innerHTML = "";
  const cats = ["all", ...new Set(allChannels.map(c=>c.cat).filter(Boolean))];
  cats.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "cf" + (cat===activeFilter?" active":"");
    btn.textContent = cat==="all" ? "🌐 All Channels" : catEmoji(cat)+" "+cap(cat);
    btn.onclick = () => { activeFilter=cat; buildCatFilter(); buildChannelList(); };
    div.appendChild(btn);
  });
}

// ── Channel list ──
function visibleChannels(){
  return allChannels.filter(c =>
    activeFilter==="all" || (c.cat||"").toLowerCase()===activeFilter.toLowerCase()
  );
}
function buildChannelList(){
  const list = document.getElementById("ch-list");
  list.innerHTML = "";
  const vis = visibleChannels();
  if(!vis.length){
    list.innerHTML=`<p style="color:var(--muted);text-align:center;padding:20px;font-size:13px;">No channels.</p>`;
    return;
  }
  vis.forEach(ch => {
    const i = allChannels.indexOf(ch);
    const div = document.createElement("div");
    div.className = "ch-item"+(i===currentIndex?" playing":"");
    div.id = "ch-item-"+i;
    const badge = failedSet.has(i)
      ? `<div class="err-badge">⚠</div>`
      : `<div class="live-badge">LIVE</div>`;
    div.innerHTML =
      `<div class="ch-icon">${catEmoji(ch.cat)}</div>`+
      `<div class="ch-info">`+
        `<div class="ch-title">${esc(ch.name)}</div>`+
        `<div class="ch-cat-lbl">${catEmoji(ch.cat)} ${esc(cap(ch.cat)||"Live TV")}</div>`+
      `</div>`+badge;
    div.onclick = () => { failedSet.delete(i); playChannel(i); };
    list.appendChild(div);
  });
}
function markActive(idx){
  document.querySelectorAll(".ch-item").forEach(el=>{
    const i=parseInt(el.id.replace("ch-item-",""));
    el.classList.toggle("playing",i===idx);
  });
  const el=document.getElementById("ch-item-"+idx);
  if(el) el.scrollIntoView({behavior:"smooth",block:"nearest"});
}

// ── Play ──
function playChannel(idx){
  clearTimeout(failoverTimer);
  if(idx<0||idx>=allChannels.length) return;
  currentIndex=idx; errorCount=0;
  const ch=allChannels[idx];
  chNameEl.textContent=ch.name;
  catBadge.textContent=cap(ch.cat)||"TV";
  markActive(idx);
  updateInfoPanel(ch);
  hideFBar();
  loadStream(ch.url);
}

// ── Stream detection ──
function detectStrategies(url){
  const u=(url||"").toLowerCase().split("?")[0];
  if(u.includes(".m3u8"))                              return ["hls"];
  if(u.endsWith(".ts"))                                return ["hls","direct"];
  if(u.endsWith(".mp4")&&(u.includes("/live/")||u.includes("/dash/")||u.includes("cdn")))
                                                        return ["direct","hls"];
  if(u.endsWith(".mp4"))                               return ["direct","hls"];
  if(u.includes(".php"))                               return ["hls","direct"];
  return ["hls","direct"];
}

// ── Load stream ──
function loadStream(url){
  showSt("Connecting...",true,"");
  destroyHls();
  if(!url){showSt("No URL.",false,"");return;}
  strategies=detectStrategies(url); strategyIndex=0;
  tryNext(url);
}
function tryNext(url){
  if(strategyIndex>=strategies.length){onFail("All formats failed");return;}
  const s=strategies[strategyIndex];
  showSt("Connecting...",true,s==="hls"?"Trying HLS…":"Trying direct…");
  if(s==="hls") tryHLS(url); else tryDirect(url);
}
function tryHLS(url){
  destroyHls();
  if(Hls.isSupported()){
    hlsInst=new Hls({enableWorker:true,startLevel:-1,abrEwmaDefaultEstimate:500000,
      abrBandWidthFactor:.8,abrBandWidthUpFactor:.7,maxBufferLength:20,maxMaxBufferLength:40,
      backBufferLength:10,manifestLoadingMaxRetry:2,levelLoadingMaxRetry:2,fragLoadingMaxRetry:2,
      manifestLoadingRetryDelay:600,xhrSetup:xhr=>{xhr.withCredentials=false;}});
    hlsInst.loadSource(url); hlsInst.attachMedia(video);
    hlsInst.on(Hls.Events.MANIFEST_PARSED,(e,d)=>{
      buildQMenu(d.levels); hlsInst.currentLevel=-1;
      video.play().catch(()=>{video.muted=true;muteBtn.textContent="🔇";isMuted=true;video.play().catch(()=>{});});
      hideSt(); updateNetLbl(); errorCount=0;
    });
    hlsInst.on(Hls.Events.LEVEL_SWITCHED,()=>updateNetLbl());
    hlsInst.on(Hls.Events.ERROR,(e,d)=>{
      if(d.fatal){
        if(d.type===Hls.ErrorTypes.NETWORK_ERROR&&errorCount<2){errorCount++;showSt("Reconnecting...",true,"Network issue");hlsInst.startLoad();}
        else if(d.type===Hls.ErrorTypes.MEDIA_ERROR&&errorCount<2){errorCount++;showSt("Recovering...",true,"");hlsInst.recoverMediaError();}
        else{strategyIndex++;tryNext(url);}
      }
    });
  } else if(video.canPlayType("application/vnd.apple.mpegurl")){
    video.src=url;
    video.oncanplay=()=>{video.play().catch(()=>{});hideSt();buildQMenu([]);};
    video.onerror=()=>{strategyIndex++;tryNext(url);};
  } else{strategyIndex++;tryNext(url);}
}
function tryDirect(url){
  destroyHls(); video.src=url; let ok=false;
  const t=setTimeout(()=>{if(!ok){strategyIndex++;tryNext(url);}},9000);
  video.oncanplay=()=>{ok=true;clearTimeout(t);
    video.play().catch(()=>{video.muted=true;muteBtn.textContent="🔇";isMuted=true;video.play().catch(()=>{});});
    hideSt();buildQMenu([]);errorCount=0;};
  video.onerror=()=>{clearTimeout(t);strategyIndex++;tryNext(url);};
}

// ── Failover ──
function onFail(reason){
  failedSet.add(currentIndex); buildChannelList();
  const next=findNextWorking();
  if(next===-1){showSt("No streams available",false,"All channels offline");return;}
  showFBar(`⚡ "${allChannels[currentIndex]?.name}" unavailable — switching...`);
  showSt("Switching...",true,"");
  failoverTimer=setTimeout(()=>{hideFBar();playChannel(next);},2800);
}
function findNextWorking(){
  for(let i=1;i<=allChannels.length;i++){
    const idx=(currentIndex+i)%allChannels.length;
    if(!failedSet.has(idx)) return idx;
  }
  return -1;
}

// ── Stall detection ──
function startStall(){
  stopStall();lastTime=-1;stallCount=0;
  stallTimer=setInterval(()=>{
    if(video.paused||video.ended||video.readyState<2)return;
    if(video.currentTime===lastTime){if(++stallCount>=3){stopStall();onFail("stalled");}}
    else{stallCount=0;lastTime=video.currentTime;}
  },3000);
}
function stopStall(){clearInterval(stallTimer);stallTimer=null;}
video.addEventListener("playing",()=>{startStall();errorCount=0;});
video.addEventListener("error",()=>{if(!hlsInst)onFail("video error");});

function destroyHls(){
  stopStall();
  if(hlsInst){hlsInst.destroy();hlsInst=null;}
  video.removeAttribute("src");video.load();
  video.oncanplay=null;video.onerror=null;
  currentLevels=[];qBtn.textContent="AUTO";qMenu.innerHTML="";netLbl.textContent="";
}
function showSt(t,l,s){stateEl.classList.remove("hidden");stTxt.textContent=t;stSub.textContent=s||"";spinEl.style.display=l?"block":"none";}
function hideSt(){stateEl.classList.add("hidden");}
function showFBar(m){fBar.textContent=m;fBar.style.display="block";}
function hideFBar(){fBar.style.display="none";}

// ── Quality ──
function buildQMenu(levels){
  currentLevels=levels;qMenu.innerHTML="";
  const a=document.createElement("div");a.className="qo active";a.innerHTML="🔄 AUTO";a.onclick=()=>setQ(-1);qMenu.appendChild(a);
  [...levels].sort((a,b)=>(b.height||0)-(a.height||0)).forEach((lvl)=>{
    const orig=levels.indexOf(lvl);const lbl=lvl.height?lvl.height+"p":"Lvl "+(orig+1);
    const o=document.createElement("div");o.className="qo";o.textContent=lbl;o.onclick=()=>setQ(orig);qMenu.appendChild(o);
  });
  qBtn.style.display=levels.length?"":"none";
}
function setQ(idx){
  if(hlsInst)hlsInst.currentLevel=idx;qMenu.classList.remove("open");
  document.querySelectorAll(".qo").forEach((el,i)=>el.classList.toggle("active",i===0&&idx===-1));
  qBtn.textContent=idx===-1?"AUTO":(currentLevels[idx]?.height?currentLevels[idx].height+"p":"AUTO");
  updateNetLbl();
}
function toggleQMenu(){if(!currentLevels.length){toast("Quality N/A");return;}qMenu.classList.toggle("open");}
function updateNetLbl(){
  if(!hlsInst){netLbl.textContent="";return;}
  const l=hlsInst.currentLevel,lvl=currentLevels[l];
  if(l<0||!lvl){netLbl.textContent="AUTO";return;}
  const h=lvl.height||0;
  netLbl.textContent=h>=1080?"1080p":h>=720?"720p":h>=480?"480p":h>=360?"360p":h>0?h+"p":"AUTO";
}

// ── Mute ──
function toggleMute(){isMuted=!isMuted;video.muted=isMuted;muteBtn.textContent=isMuted?"🔇":"🔊";toast(isMuted?"🔇 Muted":"🔊 Sound On");}

// ── Portrait ──
function togglePortrait(){
  rotated=!rotated;document.body.classList.toggle("rotated",rotated);
  portBtn.textContent=rotated?"↺":"⟳";
  if(rotated&&(fsActive||nativeFsActive))exitFS();
  toast(rotated?"📱 Portrait — tap ↺ to restore":"↩️ Normal view");
}

// ── Fullscreen ──
function toggleFS(){
  if(rotated){toast("Exit portrait first");return;}
  const isNative=!!(document.fullscreenElement||document.webkitFullscreenElement);
  if(nativeFsActive||isNative){exitNativeFS();return;}
  if(fsActive){exitCssFS();return;}
  const sec=document.getElementById("video-section");
  const req=sec.requestFullscreen||sec.webkitRequestFullscreen;
  if(req)req.call(sec).then(()=>{nativeFsActive=true;fsBtn.textContent="✕";}).catch(()=>enterCssFS());
  else enterCssFS();
}
function enterCssFS(){fsActive=true;document.body.classList.add("fs-mode");fsBtn.textContent="✕";}
function exitCssFS(){fsActive=false;document.body.classList.remove("fs-mode");fsBtn.textContent="⛶";}
function exitNativeFS(){(document.exitFullscreen||document.webkitExitFullscreen).call(document).catch(()=>{});}
function exitFS(){if(fsActive)exitCssFS();if(nativeFsActive)exitNativeFS();}
["fullscreenchange","webkitfullscreenchange"].forEach(ev=>{
  document.addEventListener(ev,()=>{
    const on=!!(document.fullscreenElement||document.webkitFullscreenElement);
    nativeFsActive=on;fsBtn.textContent=on?"✕":"⛶";
    if(!on)document.body.classList.remove("fs-mode");
  });
});
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){if(fsActive)exitCssFS();if(rotated){rotated=false;document.body.classList.remove("rotated");portBtn.textContent="⟳";}}
});

// ── Tabs ──
function switchTab(tab){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");
  document.getElementById("ch-list").style.display=tab==="channels"?"":"none";
  document.getElementById("info-panel").style.display=tab==="info"?"":"none";
}

// ── Info ──
function updateInfoPanel(ch){
  document.getElementById("info-panel").innerHTML=
    `<div class="ir"><div class="il">Channel</div><div class="iv">${esc(ch.name)}</div></div>`+
    `<div class="divl"></div>`+
    `<div class="ir"><div class="il">Category</div><div class="iv">${catEmoji(ch.cat)} ${esc(cap(ch.cat||"Live TV"))}</div></div>`+
    `<div class="divl"></div>`+
    `<div class="ir"><div class="il">Available</div><div class="iv">${allChannels.length} channels</div></div>`+
    `<div class="divl"></div>`+
    `<div class="ir"><div class="il">Status</div><div class="iv"><span class="sl"><span class="sd"></span>Broadcasting Live</span></div></div>`+
    `<div class="divl"></div>`+
    `<div class="ir"><div class="il">Failover</div><div class="iv">✅ Auto-switch ON</div></div>`+
    `<div class="divl"></div>`+
    `<div class="ir"><div class="il">Support</div><div class="iv"><a href="https://t.me/FifaLiveTvChat" style="color:var(--red)">💬 FifaLiveTvChat</a></div></div>`;
}

// ── Toast ──
function toast(msg){
  const el=document.getElementById("toast");el.textContent=msg;el.classList.add("show");
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("show"),2300);
}
document.addEventListener("click",e=>{
  if(!document.getElementById("q-wrap").contains(e.target))qMenu.classList.remove("open");
});
</script>
</body>
